<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spain fuel prices — averages</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --muted: #94a3b8; --text: #e2e8f0;
    --accent: #38bdf8; --accent-2: #f59e0b; --ok: #22c55e; --err: #ef4444;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    max-width: 900px; margin: 0 auto 1.5rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  h1 { font-size: 1.5rem; margin: 0; font-weight: 600; }
  button {
    background: var(--accent); color: #082f49; border: 0;
    padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: 600;
    cursor: pointer; font-size: 1rem;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  main { max-width: 900px; margin: 0 auto; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.75rem 1.5rem;
  }
  .card h2 {
    font-size: 0.85rem; font-weight: 500; color: var(--muted);
    margin: 0 0 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .price {
    font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1;
  }
  .price .unit { font-size: 1rem; color: var(--muted); font-weight: 500; margin-left: 0.4rem; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-top: 0.7rem; }
  .accent-1 .price { color: var(--accent); }
  .accent-2 .price { color: var(--accent-2); }
  .empty { color: var(--muted); font-style: italic; font-size: 1.4rem; font-weight: 500; }

  .status { font-size: 0.9rem; min-height: 1.4em; padding: 0.5rem 0; color: var(--muted); }
  .status.err { color: var(--err); }
  .status.ok { color: var(--ok); }

  .footer {
    color: var(--muted); font-size: 0.82rem; margin-top: 1.5rem; line-height: 1.6;
  }
  .footer a { color: var(--accent); }
  .spinner {
    display: inline-block; width: 0.8em; height: 0.8em; margin-right: 0.4em;
    border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%;
    animation: spin 0.7s linear infinite; vertical-align: -0.1em;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Spain fuel prices — averages</h1>
  <button id="refresh">Download prices</button>
</header>

<main>
  <div class="cards">
    <div class="card accent-1">
      <h2>Gasolina 95 E5</h2>
      <div class="price" id="g95-price"><span class="empty">—</span></div>
      <div class="meta" id="g95-meta"></div>
    </div>
    <div class="card accent-2">
      <h2>Gasóleo A</h2>
      <div class="price" id="da-price"><span class="empty">—</span></div>
      <div class="meta" id="da-meta"></div>
    </div>
  </div>

  <div class="status" id="status">Click <strong>Download prices</strong> to fetch the latest averages from the Spanish Ministry's REST API.</div>

  <div class="footer" id="footer">
    Source: <a href="https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/help" target="_blank" rel="noopener">Spanish Ministry of Energy — fuel prices REST API</a>.
    Data updated hourly.
  </div>
</main>

<script>
"use strict";

const API_URL =
  "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/";

const numFmt = new Intl.NumberFormat("es-ES", { minimumFractionDigits: 4, maximumFractionDigits: 4 });
const num3 = new Intl.NumberFormat("es-ES", { minimumFractionDigits: 3, maximumFractionDigits: 3 });
const intFmt = new Intl.NumberFormat("es-ES");

const $ = (id) => document.getElementById(id);

function setStatus(msg, cls = "") {
  $("status").innerHTML = msg;
  $("status").className = "status" + (cls ? " " + cls : "");
}

function toNumberEs(v) {
  if (v === null || v === undefined || v === "") return null;
  const s = String(v).trim().replace(",", ".");
  if (!s) return null;
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
}

function average(values) {
  if (!values.length) return null;
  return values.reduce((a, b) => a + b, 0) / values.length;
}

function setCard(elPrice, elMeta, fuelStat) {
  if (!fuelStat) {
    $(elPrice).innerHTML = '<span class="empty">no data</span>';
    $(elMeta).textContent = "";
    return;
  }
  $(elPrice).innerHTML =
    `${numFmt.format(fuelStat.avg)}<span class="unit">€/L</span>`;
  $(elMeta).textContent =
    `${intFmt.format(fuelStat.count)} stations · `
    + `min ${num3.format(fuelStat.min)} · max ${num3.format(fuelStat.max)}`;
}

async function fetchPrices() {
  const r = await fetch(API_URL, {
    method: "GET",
    headers: { Accept: "application/json" },
    cache: "no-store",
  });
  if (!r.ok) throw new Error(`HTTP ${r.status} from API`);
  return await r.json();
}

function summarize(json) {
  const stations = json.ListaEESSPrecio || [];
  const g95 = [], gA = [];
  for (const s of stations) {
    const a = toNumberEs(s["Precio Gasolina 95 E5"]); if (a !== null) g95.push(a);
    const b = toNumberEs(s["Precio Gasoleo A"]);      if (b !== null) gA.push(b);
  }
  const stat = (vals) => vals.length ? {
    avg: average(vals), count: vals.length,
    min: Math.min(...vals), max: Math.max(...vals),
  } : null;
  return {
    snapshot: json.Fecha || "",
    totalStations: stations.length,
    gasolina95: stat(g95),
    gasoleoA:   stat(gA),
  };
}

async function refresh() {
  const btn = $("refresh");
  btn.disabled = true;
  setStatus(`<span class="spinner"></span> Fetching live data from the Ministry…`);
  try {
    const json = await fetchPrices();
    const s = summarize(json);
    setCard("g95-price", "g95-meta", s.gasolina95);
    setCard("da-price",  "da-meta",  s.gasoleoA);
    const localTime = new Date().toLocaleTimeString("es-ES");
    setStatus(
      `Updated. Source snapshot: <strong>${s.snapshot}</strong> · `
      + `${intFmt.format(s.totalStations)} stations total · `
      + `loaded at ${localTime}`,
      "ok"
    );
  } catch (e) {
    console.error(e);
    setStatus(`Failed: ${e.message}`, "err");
  } finally {
    btn.disabled = false;
  }
}

$("refresh").addEventListener("click", refresh);

// Auto-fetch on first load.
refresh();
</script>

</body>
</html>
