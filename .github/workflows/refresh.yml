name: Refresh fuel prices

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC on the 1st of each month
    - cron: "0 6 1 * *"

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python refresh.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json"
          else
            git add data.json
            git commit -m "Refresh fuel prices ($(date -u +'%Y-%m-%d %H:%MZ'))"
            git push
          fi
