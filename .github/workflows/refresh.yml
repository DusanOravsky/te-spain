name: Refresh fuel prices

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC on the 1st of each month
    - cron: "0 6 1 * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATA_BRANCH: refresh-data
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python refresh.py

      - name: Push data.json to refresh branch
        id: push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change in data.json — skipping PR."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

          # Reset the data branch to current main, apply the data.json change, and push.
          git checkout -B "$DATA_BRANCH"
          git add data.json
          git commit -m "Refresh fuel prices ($(date -u +'%Y-%m-%d %H:%MZ'))"
          git push --force-with-lease origin "$DATA_BRANCH"

      - name: Open or update PR
        if: steps.push.outputs.changed == 'true'
        run: |
          set -euo pipefail
          existing=$(gh pr list --head "$DATA_BRANCH" --base main --state open --json number --jq '.[0].number' || true)
          title="Refresh fuel prices ($(date -u +'%Y-%m-%d'))"
          body="Automated refresh of \`data.json\` from geoportalgasolineras.es. Triggered via \`workflow_dispatch\`."
          if [ -z "$existing" ]; then
            url=$(gh pr create --base main --head "$DATA_BRANCH" --title "$title" --body "$body")
            number=$(echo "$url" | grep -oE '[0-9]+$')
          else
            number="$existing"
            gh pr edit "$number" --title "$title" --body "$body"
          fi
          echo "PR #$number"
          gh pr merge "$number" --auto --squash || \
            echo "Auto-merge could not be enabled (org may not permit it; PR is open for manual merge)."
